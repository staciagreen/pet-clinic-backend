spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/lab2_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:stacia}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

security.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

spring.security.enable-csrf=false

