spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/lab2_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:stacia}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

# Flyway ????????
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# JWT Configuration - Use environment variables in production
security.jwt.secret=${JWT_SECRET:ChangeMeToStrongSecret}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ????????? CSRF (??? stateless/JWT)
spring.security.enable-csrf=false